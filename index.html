<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Job Interview Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #F5F3EE;
  --surface:  #FFFFFF;
  --border:   #E4E0D8;
  --ink:      #1A1814;
  --ink2:     #6B6560;
  --accent:   #1B3A5C;
  --accent-lt:#EBF0F7;
  --user-bg:  #1B3A5C;
  --user-txt: #FFFFFF;
  --ai-bg:    #FFFFFF;
  --ai-txt:   #1A1814;
  --green:    #0F7B5B;
  --green-lt: #E8F5F1;
  --red:      #C0392B;
  --red-lt:   #FDF0EE;
  --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.shell {
  max-width: 720px;
  margin: 0 auto;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 0 16px;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.interviewer-avatar {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.interviewer-name {
  font-family: 'Instrument Serif', serif;
  font-size: 17px;
  color: var(--ink);
  line-height: 1.2;
}
.interviewer-role {
  font-size: 12px;
  color: var(--ink2);
  margin-top: 1px;
}
.status-dot {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--green);
  font-weight: 600;
}
.status-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-green 2s ease-in-out infinite;
}
@keyframes pulse-green {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── MESSAGES ── */
.msg {
  display: flex;
  gap: 10px;
  animation: msgIn .3s cubic-bezier(.4,0,.2,1) both;
  max-width: 86%;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg.ai   { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.ai .msg-avatar   { background: var(--accent); }
.msg.user .msg-avatar { background: #E4E0D8; }

.msg-bubble {
  padding: 13px 16px;
  border-radius: 18px;
  font-size: 14.5px;
  line-height: 1.65;
  max-width: 100%;
}
.msg.ai .msg-bubble {
  background: var(--ai-bg);
  color: var(--ai-txt);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  box-shadow: var(--shadow);
}
.msg.user .msg-bubble {
  background: var(--user-bg);
  color: var(--user-txt);
  border-top-right-radius: 4px;
}
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-style: italic; opacity: .85; }

/* Thinking indicator */
.msg.thinking .msg-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  box-shadow: var(--shadow);
  padding: 14px 20px;
}
.dots {
  display: flex; gap: 5px; align-items: center;
  height: 16px;
}
.dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ink2);
  animation: dot-bounce .9s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .15s; }
.dots span:nth-child(3) { animation-delay: .30s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: .4; }
  40%           { transform: translateY(-6px); opacity: 1; }
}

/* Timestamp */
.msg-time {
  font-size: 11px;
  color: var(--ink2);
  margin-top: 4px;
  opacity: .7;
}
.msg.user .msg-time { text-align: right; }
.msg-inner { display: flex; flex-direction: column; }

/* ── SESSION INFO BAR ── */
.session-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--accent-lt);
  border: 1px solid #C8D8EC;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
  flex-shrink: 0;
  margin-bottom: 4px;
}
.session-bar .icon { font-size: 16px; }

/* ── INPUT AREA ── */
.input-area {
  padding: 14px 0 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.textarea-wrap {
  flex: 1;
  position: relative;
}
textarea {
  width: 100%;
  min-height: 52px;
  max-height: 160px;
  padding: 14px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  resize: none;
  outline: none;
  line-height: 1.5;
  transition: border-color .2s, box-shadow .2s;
  overflow-y: auto;
}
textarea::placeholder { color: #B0AC9E; }
textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(27,58,92,.1);
}
.char-count {
  position: absolute;
  bottom: 10px; right: 12px;
  font-size: 11px;
  color: var(--ink2);
  opacity: .6;
  pointer-events: none;
}
.char-count.warn { color: var(--red); opacity: 1; }

.btn-send {
  width: 52px; height: 52px;
  border-radius: 16px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .18s;
  box-shadow: 0 4px 12px rgba(27,58,92,.25);
}
.btn-send:hover:not(:disabled) {
  background: #254e7a;
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(27,58,92,.3);
}
.btn-send:active:not(:disabled) { transform: translateY(0); }
.btn-send:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-send svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.hint {
  font-size: 12px;
  color: var(--ink2);
  margin-top: 8px;
  text-align: center;
  opacity: .7;
}

/* ── ERROR TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--red);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  z-index: 999;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  flex-shrink: 0;
  padding: 10px 0 4px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #4A90C4);
  border-radius: 3px;
  transition: width .6s ease;
}
.progress-label {
  font-size: 12px;
  color: var(--ink2);
  white-space: nowrap;
  font-weight: 600;
}

@media (max-width: 480px) {
  .shell { padding: 0 12px; }
  .msg { max-width: 92%; }
  textarea { font-size: 16px; } /* prevent iOS zoom */
}
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="interviewer-avatar">🧑‍💼</div>
      <div>
        <div class="interviewer-name">Alex Morgan</div>
        <div class="interviewer-role">Senior HR · Interview Simulator</div>
      </div>
    </div>
    <div class="status-dot">Live Session</div>
  </header>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 exchanges</div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
    <div class="session-bar">
      <span class="icon">💼</span>
      Your interview session has started. Answer naturally and honestly.
    </div>
    <!-- Opening message injected by JS -->
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <div class="textarea-wrap">
        <textarea
          id="user-input"
          placeholder="Type your answer here..."
          maxlength="1000"
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="handleInput(this)"
        ></textarea>
        <span class="char-count" id="char-count">0/1000</span>
      </div>
      <button class="btn-send" id="btn-send" onclick="sendMessage()" title="Send answer">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="hint">Press <kbd style="font-family:inherit;background:var(--border);padding:1px 5px;border-radius:4px;font-size:11px">Enter</kbd> to send · <kbd style="font-family:inherit;background:var(--border);padding:1px 5px;border-radius:4px;font-size:11px">Shift+Enter</kbd> for new line</div>
  </div>

</div>

<!-- ERROR TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const WEBHOOK = 'https://hook.us2.make.com/49o5vxsgya86k4d6sj51uy3igyncqc04';
const MAX_CHARS = 1000;

// ── STATE ───────────────────────────────────────────────────
let exchangeCount = 0;
let isWaiting     = false;

// ── DOM REFS ────────────────────────────────────────────────
const chatArea    = document.getElementById('chat-area');
const userInput   = document.getElementById('user-input');
const btnSend     = document.getElementById('btn-send');
const charCount   = document.getElementById('char-count');
const progressFill  = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');
const toast       = document.getElementById('toast');

// ── INIT ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  appendAI("Hi! I'm Alex, and I'll be conducting your interview today. 😊\n\nLet's start with the classic opener:\n\n**Tell me about yourself.** What's your background, and what brings you to this role?");
  userInput.focus();
});

// ── HELPERS ─────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function scrollToBottom() {
  setTimeout(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  }, 60);
}

function updateProgress() {
  const pct = Math.min(exchangeCount * 10, 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = exchangeCount + (exchangeCount === 1 ? ' exchange' : ' exchanges');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ── APPEND MESSAGES ─────────────────────────────────────────
function appendAI(text) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ai';
  wrapper.innerHTML = `
    <div class="msg-avatar">🧑‍💼</div>
    <div class="msg-inner">
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  chatArea.appendChild(wrapper);
  scrollToBottom();
}

function appendUser(text) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg user';
  wrapper.innerHTML = `
    <div class="msg-avatar">🙋</div>
    <div class="msg-inner">
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  chatArea.appendChild(wrapper);
  scrollToBottom();
}

function showThinking() {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ai thinking';
  wrapper.id = 'thinking-msg';
  wrapper.innerHTML = `
    <div class="msg-avatar">🧑‍💼</div>
    <div class="msg-inner">
      <div class="msg-bubble">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  chatArea.appendChild(wrapper);
  scrollToBottom();
  return wrapper;
}

function removeThinking() {
  const el = document.getElementById('thinking-msg');
  if (el) el.remove();
}

// ── SEND MESSAGE ────────────────────────────────────────────
async function sendMessage() {
  if (isWaiting) return;

  const text = userInput.value.trim();

  if (!text) {
    showToast('⚠️ Please type your answer before sending.');
    userInput.focus();
    return;
  }

  // Append user bubble
  appendUser(text);

  // Clear textarea + char count
  userInput.value = '';
  charCount.textContent = '0/' + MAX_CHARS;
  charCount.classList.remove('warn');
  autoResize(userInput);

  // Lock UI
  isWaiting = true;
  btnSend.disabled = true;
  userInput.disabled = true;

  // Show thinking
  const thinkingEl = showThinking();

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) {
      throw new Error(`Server responded with status ${res.status}`);
    }

    const reply = await res.text();

    removeThinking();
    appendAI(reply && reply.trim() ? reply.trim() : "I didn't quite get that. Could you rephrase?");

    exchangeCount++;
    updateProgress();

  } catch (err) {
    removeThinking();
    appendAI("⚠️ I couldn't connect right now. Please check your connection and try again.");
    showToast('Connection error — please try again.');
    console.error('[Interview Simulator]', err);
  } finally {
    isWaiting = false;
    btnSend.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }
}

// ── KEYBOARD SHORTCUT ────────────────────────────────────────
function handleKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ── INPUT HANDLERS ───────────────────────────────────────────
function handleInput(el) {
  const len = el.value.length;
  charCount.textContent = len + '/' + MAX_CHARS;
  charCount.classList.toggle('warn', len > MAX_CHARS * 0.9);
  autoResize(el);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
</script>
</body>
</html>
